                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="absolute -bottom-20 -left-20 opacity-5 pointer-events-none">
                                <i className="fas fa-microchip text-[400px] text-blue-900"></i>
                            </div>
                        </section>

                        {/* 8. CALL TO ACTION (SAIBA MAIS / QR CODE) */}
                        <section className="bg-blue-700 rounded-[3rem] p-12 lg:p-20 relative overflow-hidden shadow-2xl mt-12 border-4 border-blue-500 flex items-center justify-center">
                            {/* Fundo decorativo */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 -mt-10 opacity-5 pointer-events-none">
                                <i className="fas fa-qrcode text-[400px] text-white"></i>
                            </div>

                            <div className="relative z-10 flex flex-col lg:flex-row items-center justify-center gap-10 lg:gap-16 w-full max-w-5xl mx-auto">
                                
                                {/* TEXTO CENTRAL (Agora à esquerda no layout de 2 colunas) */}
                                <div className="text-center lg:text-left flex-1 flex flex-col items-center lg:items-start justify-center px-4 order-2 lg:order-1">
                                    <span className="bg-blue-900/50 text-blue-100 text-sm font-bold px-6 py-2.5 rounded-full uppercase tracking-widest mb-8 inline-block border border-blue-500/30 backdrop-blur-sm">
                                        Dê o Próximo Passo
                                    </span>
                                    <h2 className="text-4xl lg:text-5xl xl:text-6xl font-black text-white mb-8 leading-tight drop-shadow-md">
                                        Leve este material com você
                                    </h2>
                                    <p className="text-xl lg:text-2xl text-blue-100 leading-relaxed mb-10 font-medium">
                                        Aponte a câmera para o código ao lado e faça o download do <strong>Infográfico Completo</strong> em formato digital para consultar e compartilhar.
                                    </p>
                                    
                                    {/* Logo Quem Forma Transforma */}
                                    <div className="bg-white px-8 py-4 rounded-3xl shadow-2xl border-b-4 border-blue-200 hover:-translate-y-1 transition-transform inline-block">
                                        <img 
                                            src="https://i.postimg.cc/5yZDHWc8/marca-QUEM-FORMA-TRANSFORMA-01.png" 
                                            alt="Quem Forma Transforma" 
                                            className="h-10 lg:h-14 object-contain"
                                        />
                                    </div>
                                </div>

                                {/* CARD DO QR CODE (Único e de Maior Destaque) */}
                                <div className="flex-shrink-0 bg-white p-8 rounded-[2.5rem] shadow-2xl transform transition-transform hover:scale-105 duration-300 w-full max-w-[280px] lg:max-w-[360px] flex flex-col items-center order-1 lg:order-2">
                                    <div className="border-4 border-dashed border-blue-100 p-4 rounded-3xl flex justify-center items-center bg-white w-full aspect-square">
                                        <img 
                                            src="https://i.postimg.cc/sgt4ZvKd/https-detsesisenai-dot-github-io-Workshop-Aprendizagem.png" 
                                            alt="QR Code Infográfico" 
                                            className="w-full h-full object-contain rounded-xl"
                                        />
                                    </div>
                                    <div className="mt-8 flex flex-col items-center justify-center w-full">
                                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mb-4 shadow-inner">
                                            <i className="fas fa-file-pdf"></i>
                                        </div>
                                        <p className="text-center text-slate-800 font-black uppercase tracking-widest text-xl lg:text-2xl leading-tight">
                                            Infográfico<br/>Completo
                                        </p>
                                        <p className="text-md text-slate-500 font-semibold mt-2 text-center">Acesse a versão digital</p>
                                    </div>
                                </div>

                            </div>
                        </section>

                    </main>

                    {/* Componentes Modais */}
                    <Modal 
                        isOpen={!!activeCaseModal} 
                        onClose={() => setActiveCaseModal(null)} 
                        data={activeCaseModal} 
                    />

                    <CourseModal 
                        isOpen={!!activeCourseModal} 
                        onClose={() => setActiveCourseModal(null)} 
                        course={activeCourseModal} 
                    />

                    {/* NOVOS MODAIS APLICADOS AO BLOCO 2 */}
                    <ImpactModal 
                        isOpen={!!activeImpactModal} 
                        onClose={() => setActiveImpactModal(null)} 
                        data={activeImpactModal} 
                    />

                    <MacroModal 
                        isOpen={!!activeMacroModal} 
                        onClose={() => setActiveMacroModal(null)} 
                        data={activeMacroModal} 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
